<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In · AI Generalist</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    nav { padding: 20px 60px; }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-box {
      width: 100%;
      max-width: 420px;
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .auth-header p { color: var(--text-muted); font-size: 0.92rem; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
    }

    .btn-full {
      width: 100%;
      padding: 13px;
      font-size: 0.95rem;
      border-radius: 6px;
      margin-top: 4px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.88rem;
    }
    .auth-footer a { color: var(--accent); }
    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .error-msg {
      background: rgba(201, 76, 76, 0.1);
      border: 1px solid rgba(201, 76, 76, 0.4);
      color: #e07070;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.87rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html"><div class="logo">AI Generalist</div></a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box">

      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Log in to your AI Generalist account</p>
      </div>

      <div class="auth-card">
        <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••"/>
        </div>

        <button class="btn btn-primary btn-full" onclick="handleLogin()">Log In</button>

        <div class="divider">or</div>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign up free</a>
        </div>
      </div>

    </div>
  </div>

  <footer>© 2025 AI Generalist</footer>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      // For now, any input goes to dashboard (backend not connected yet)
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
