<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up · AI Generalist</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-box { width: 100%; max-width: 400px; }

    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .auth-header p { color: var(--text2); font-size: 0.88rem; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
    }

    .btn-full { width: 100%; padding: 11px; justify-content: center; margin-top: 6px; }

    .auth-foot {
      text-align: center;
      margin-top: 18px;
      color: var(--text2);
      font-size: 0.85rem;
    }
    .auth-foot a { color: var(--accent2); }
    .auth-foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html"><div class="logo">AI Generalist</div></a>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()">
      <span class="icon-moon">🌙</span>
      <span class="icon-sun">☀️</span>
    </button>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-header">
      <h1>Create your account</h1>
      <p>Start working smarter today — it's free</p>
    </div>

    <div class="auth-card">
      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="name" placeholder="e.g. Ahmed Khan"/>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters"/>
      </div>

      <button class="btn btn-primary btn-full" onclick="handleSignup()">Create account</button>

      <div class="auth-foot" style="margin-top:16px">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>

  </div>
</div>

<footer>© 2025 AI Generalist</footer>

<script>
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);

  function toggleTheme() {
    const html = document.documentElement;
    html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    localStorage.setItem('theme', html.getAttribute('data-theme'));
  }

  function handleSignup() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');

    if (!name || !email || !password) {
      err.textContent = 'Please fill in all fields.';
      err.style.display = 'block';
      return;
    }
    if (password.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      err.style.display = 'block';
      return;
    }

    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>
